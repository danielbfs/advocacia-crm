# ============================================================
# AdvocacIA CRM — docker-compose.yml (PRODUÇÃO)
#
# Deploy via Hostinger: URL do GitHub → docker-compose.yml
# O Traefik da Hostinger (ou externo) roteia tráfego para os
# containers via labels Docker. Nenhum proxy dentro deste compose.
#
# Dev local:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================================

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://advocacia_crm:${DB_PASSWORD:-advocacia_crm}@db/advocacia_crm
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution_api:8080}
  EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-advocacia-crm-evo-key}
  EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-advocacia-crm}
  FIRM_TIMEZONE: ${FIRM_TIMEZONE:-America/Sao_Paulo}
  FIRM_SLA_HOURS: ${FIRM_SLA_HOURS:-2}
  ENVIRONMENT: production
  DOMAIN: ${DOMAIN:-localhost}

networks:
  internal:
    name: advocacia_crm_internal

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

services:

  # ── BANCO DE DADOS ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: advocacia_crm
      POSTGRES_USER: advocacia_crm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-advocacia_crm}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advocacia_crm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── CACHE + FILA ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal

  # ── BACKEND API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "127.0.0.1:8000:8000"   # só localhost — Traefik host-mode alcança via 127.0.0.1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.advocacia-crm-backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`) || PathPrefix(`/health`))"
      - "traefik.http.routers.advocacia-crm-backend.tls=true"
      - "traefik.http.routers.advocacia-crm-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.advocacia-crm-backend.loadbalancer.server.url=http://127.0.0.1:8000"

  # ── FRONTEND ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # só localhost — Traefik host-mode alcança via 127.0.0.1
    environment:
      NODE_ENV: production
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.advocacia-crm-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.advocacia-crm-frontend.tls=true"
      - "traefik.http.routers.advocacia-crm-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.advocacia-crm-frontend.loadbalancer.server.url=http://127.0.0.1:3000"
      # Prioridade menor que o backend (rotas /api vão pro backend primeiro)
      - "traefik.http.routers.advocacia-crm-frontend.priority=1"

  # ── WORKERS CELERY ───────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery_app worker --loglevel=info -Q default,followup,leads --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  # ── WHATSAPP (EVOLUTION API) ─────────────────────────────
  evolution_api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_PORT: "8080"
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-advocacia-crm-evo-key}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://advocacia_crm:${DB_PASSWORD:-advocacia_crm}@db:5432/evolution"
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      REDIS_ENABLED: "true"
      REDIS_URI: "redis://redis:6379/1"
      REDIS_PREFIX_KEY: "evolution"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/2"
      CACHE_REDIS_PREFIX_KEY: "cache"
      RABBITMQ_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: "10"
      LOG_LEVEL: "WARN"
      LOG_COLOR: "false"
      LOG_BAILEYS: "fatal"
      LANGUAGE: "pt-BR"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - redis
    networks:
      - internal
